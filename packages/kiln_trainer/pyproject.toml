[project]
name = "kiln_trainer"
version = "0.1.0"
description = "Kiln's Python sidecar — wraps MLX-LM for LoRA SFT/DPO, fuse, and generation. Speaks JSON-lines over stdio to the Swift app."
requires-python = ">=3.11,<3.12"
readme = { text = "Populated at M1 — see SPEC §4.3 and .claude/skills/mlx-lora-finetuning/.", content-type = "text/plain" }
license = { text = "MIT" }
authors = [{ name = "Kiln" }]
# Runtime deps land in M1 (mlx, mlx-lm, safetensors, sentencepiece). M0 is scaffold-only.
dependencies = []

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/kiln_trainer"]

[dependency-groups]
dev = [
    "pytest>=8",
]

[tool.pytest.ini_options]
minversion = "8.0"
testpaths = ["tests"]
addopts = "-ra"
pythonpath = ["src"]

[project]
name = "kiln_trainer"
version = "0.1.0"
description = "Kiln's Python sidecar — wraps MLX-LM for LoRA SFT/DPO, fuse, and generation. Speaks JSON-lines over stdio to the Swift app."
requires-python = ">=3.11,<3.12"
readme = { text = """
Python 3.11 sidecar that wraps mlx-lm for Kiln's local LoRA SFT, one-off
generation, and Ollama export. Speaks JSON-lines over stdout/stderr — see
SPEC.md §11.1 for the event schema and `.claude/skills/mlx-lora-finetuning/`
for operational details. Local DECISIONS.md logs mlx-lm flag deviations.

Entry point: `python -m kiln_trainer <train|sample|export> ...`.
""", content-type = "text/plain" }
license = { text = "MIT" }
authors = [{ name = "Kiln" }]
dependencies = [
    "mlx-lm==0.21.*",
    "mlx>=0.22,<0.23",
    "safetensors",
    "sentencepiece",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/kiln_trainer"]

[dependency-groups]
dev = [
    "pytest>=8",
]

[tool.pytest.ini_options]
minversion = "8.0"
testpaths = ["tests"]
addopts = "-ra"
pythonpath = ["src"]

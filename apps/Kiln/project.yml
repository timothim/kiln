name: Kiln

options:
  deploymentTarget:
    macOS: "14.0"
  bundleIdPrefix: com.kiln
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ENABLE_HARDENED_RUNTIME: YES
    DEAD_CODE_STRIPPING: YES

packages:
  KilnCore:
    path: ../../packages/KilnCore

targets:
  Kiln:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Sources
    dependencies:
      - package: KilnCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kiln.app
        PRODUCT_NAME: Kiln
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Kiln
        INFOPLIST_KEY_NSHumanReadableCopyright: "Copyright © 2026 Kiln"
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.developer-tools"
        INFOPLIST_KEY_NSSupportsAutomaticTermination: YES
        INFOPLIST_KEY_NSSupportsSuddenTermination: NO
        COMBINE_HIDPI_IMAGES: YES
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "-"
  KilnTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Tests
    dependencies:
      - target: Kiln
      - package: KilnCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kiln.tests
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "5.9"
